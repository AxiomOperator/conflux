services:

  # ════════════════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE SERVICES
  # ════════════════════════════════════════════════════════════════════════════

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:18
    container_name: conflux-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-Postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-nexusharness}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-Postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── DragonflyDB (Redis-compatible queue/cache) ───────────────────────────────
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    container_name: conflux-dragonfly
    restart: always
    command: --cluster_mode=emulated
    ulimits:
      memlock: -1
    ports:
      - "6379:6379"
    volumes:
      - dragonflydata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant (vector store) ────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: conflux-qdrant
    restart: always
    ports:
      - "6333:6333"  # HTTP / REST API
      - "6334:6334"  # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage:z
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── SearXNG (web search) ──────────────────────────────────────────────────────
  # IMPORTANT: Create ./searxng-config/settings.yml before first run.
  # See docs/docker-setup.md or copy from docs/searxng-settings.example.yml
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: conflux-searxng
    restart: always
    ports:
      - "8080:8080"
    environment:
      SEARXNG_BASE_URL: http://searxng:8080
    volumes:
      - ./searxng-config:/etc/searxng:Z
      - searxng_data:/var/cache/searxng
    depends_on:
      - valkey
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Valkey (SearXNG session cache — sidecar) ─────────────────────────────────
  valkey:
    image: docker.io/valkey/valkey:9-alpine
    container_name: conflux-valkey
    restart: always
    command: valkey-server --save 30 1 --loglevel warning
    volumes:
      - valkey_data:/data

  # ── faster-whisper (speech-to-text) ─────────────────────────────────────────
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: conflux-whisper
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      WHISPER__MODEL: ${WHISPER_MODEL:-base}
      WHISPER__INFERENCE_DEVICE: cpu
    volumes:
      - whisper_models:/root/.cache/huggingface

  # ════════════════════════════════════════════════════════════════════════════
  # CONFLUX APPLICATION
  # ════════════════════════════════════════════════════════════════════════════

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  conflux-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: conflux-api
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      # Override .env values with Docker service names
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-Postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-nexusharness}
      DRAGONFLY_URL: redis://dragonfly:6379
      QDRANT_URL: http://qdrant:6333
      SEARXNG_URL: http://searxng:8080
      WHISPER_BASE_URL: http://whisper:8000
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        uv run alembic upgrade head
        exec uv run uvicorn conflux.api.main:app --host 0.0.0.0 --port 8001 --workers 2
    volumes:
      - conflux_workspace:/app/workspace
      - conflux_skills:/app/skills
      - conflux_home:/app/.conflux
    depends_on:
      db:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 25s

  # ── arq Background Worker ────────────────────────────────────────────────────
  conflux-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: conflux-worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-Postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-nexusharness}
      DRAGONFLY_URL: redis://dragonfly:6379
      QDRANT_URL: http://qdrant:6333
      SEARXNG_URL: http://searxng:8080
      WHISPER_BASE_URL: http://whisper:8000
    command: ["uv", "run", "arq", "conflux.workers.WorkerSettings"]
    volumes:
      - conflux_workspace:/app/workspace
      - conflux_skills:/app/skills
      - conflux_home:/app/.conflux
    depends_on:
      conflux-api:
        condition: service_healthy

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  conflux-ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    container_name: conflux-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: ui/.env.local
    environment:
      INTERNAL_API_URL: http://conflux-api:8001
      NODE_ENV: production
      DATABASE_URL: postgresql://Postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-conflux_core}
    depends_on:
      conflux-api:
        condition: service_healthy

volumes:
  # Infrastructure
  postgres_data:
  dragonflydata:
  qdrant_storage:
  searxng_data:
  valkey_data:
  whisper_models:
  # Conflux application
  conflux_workspace:
  conflux_skills:
  conflux_home:
