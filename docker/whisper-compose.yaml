# Deploy on 192.1.3.41 with: docker compose -f docker/whisper-compose.yml up -d
# Then point WHISPER_BASE_URL at http://192.1.3.41:8000
version: '3.8'

services:
  faster-whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: nexus-whisper
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      WHISPER__MODEL: base
      WHISPER__INFERENCE_DEVICE: cpu
    volumes:
      - whisper_models:/root/.cache/huggingface

volumes:
  whisper_models: