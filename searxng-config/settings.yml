# SearXNG settings for Conflux
# Full reference: https://docs.searxng.org/admin/settings/settings.html

use_default_settings: true

server:
  secret_key: "change-me-generate-with-openssl-rand-hex-32"
  limiter: false
  image_proxy: true
  port: 8080
  bind_address: "0.0.0.0"

ui:
  static_use_hash: true

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json

# Redis-compatible session backend (Valkey sidecar)
redis:
  url: redis://valkey:6379/0

# Enabled engines — extend as needed
engines:
  - name: google
    engine: google
    shortcut: g

  - name: bing
    engine: bing
    shortcut: b

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    categories: general

  - name: github
    engine: github
    shortcut: gh
